# Build and Release
# - Runs only on push to tags v*: runs tests then builds and drafts release for Windows, macOS, Linux.
# - CI (ci.yml) runs on push to main and tests Ubuntu, Windows, macOS.
# For signed updates, set GitHub Secrets: TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD

name: Build and Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libasound2-dev libxdo-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install frontend dependencies
        run: npm install

      - name: Svelte/TypeScript check
        run: npm run check

      - name: Frontend unit tests
        run: npm run test:unit

      - name: Rust format check
        working-directory: ./src-tauri
        run: cargo fmt -- --check

      - name: Build frontend
        run: npm run build

      - name: Rust clippy
        working-directory: ./src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust tests
        working-directory: ./src-tauri
        run: cargo test

  changelog:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        id: extract
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          DEFAULT='See the assets to download this version.'
          if [ ! -f CHANGELOG.md ]; then
            echo "$DEFAULT" > release-body.md
          else
            BODY=$(awk -v tag="$TAG" -v ver="$VERSION" '
              BEGIN { found=0 }
              /^## \[/ {
                if (found) exit
                line=$0
                gsub(/^## \[|\]$/, "", line)
                if (line == tag || line == ver) { found=1; print $0; next }
                next
              }
              found { print }
            ' CHANGELOG.md)
            if [ -n "$BODY" ]; then
              echo "$BODY" > release-body.md
            else
              echo "$DEFAULT" > release-body.md
            fi
          fi
          DELIM="RELEASE_BODY_$(openssl rand -hex 8)"
          echo "body<<$DELIM" >> $GITHUB_OUTPUT
          cat release-body.md >> $GITHUB_OUTPUT
          echo "$DELIM" >> $GITHUB_OUTPUT
    outputs:
      body: ${{ steps.extract.outputs.body }}

  build:
    needs: [test, changelog]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Ensure macOS cross-compile targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libasound2-dev libxdo-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri and create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Kalam ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.body }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          assetNamePattern: '[name]-[version]-[platform]-[arch][ext]'
          args: ${{ matrix.args }}
